services:
  # Single FREE web service that runs the API + Celery worker in one container.
  # (Render charges for separate background workers, so we co-locate them.)
  - type: web
    name: databridge
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    dockerCommand: sh ./start.sh   # runs migrations, then worker + uvicorn
    envVars:
      - key: DATABASE_URL
        sync: false          # paste real value in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
